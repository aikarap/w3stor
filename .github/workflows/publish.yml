name: Release Packages

on:
  push:
    branches: [main]
    paths:
      - "packages/sdk/**"
      - "packages/cli/**"

  workflow_dispatch:
    inputs:
      package:
        description: "Which package to release"
        required: true
        type: choice
        options:
          - sdk
          - cli
          - both
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-sdk:
    name: Release @w3stor/sdk
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'sdk' || inputs.package == 'both'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK
        run: bun --filter @w3stor/sdk build

      - name: Semantic Release (SDK)
        working-directory: packages/sdk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release ${{ inputs.dry_run && '--dry-run' || '' }}

  release-cli:
    name: Release @w3stor/cli
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'cli' || inputs.package == 'both'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun --filter @w3stor/cli build

      - name: Semantic Release (CLI)
        working-directory: packages/cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release ${{ inputs.dry_run && '--dry-run' || '' }}
