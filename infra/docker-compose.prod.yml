services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-w3stor}
      POSTGRES_USER: ${POSTGRES_USER:-w3stor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-w3stor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --- Application ---
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: w3stor-app
    restart: unless-stopped
    command: ["bun", "run", "packages/api/src/index.ts"]
    ports:
      - "${API_PORT:-4000}:4000"
    env_file: ../.env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-w3stor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-w3stor}
      REDIS_URL: redis://redis:6379
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - internal

  workers:
    image: w3stor-app
    restart: unless-stopped
    command: ["bun", "run", "packages/workers/src/index.ts"]
    env_file: ../.env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-w3stor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-w3stor}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - internal

  # --- DB Migrations (run once, then exit) ---
  migrate:
    image: w3stor-app
    command: ["bun", "run", "packages/db/src/migrate.ts"]
    env_file: ../.env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-w3stor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-w3stor}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles: ["migrate"]
    networks:
      - internal

  # --- Worker Autoscaler (polls Redis, scales worker replicas) ---
  autoscaler:
    image: docker:cli
    restart: unless-stopped
    entrypoint: /bin/sh
    command: ["/autoscaler.sh"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./autoscaler.sh:/autoscaler.sh:ro
      - ./docker-compose.prod.yml:/compose.yml:ro
    environment:
      REDIS_URL: redis://redis:6379
      AUTOSCALER_MIN_WORKERS: ${AUTOSCALER_MIN_WORKERS:-1}
      AUTOSCALER_MAX_WORKERS: ${AUTOSCALER_MAX_WORKERS:-4}
      AUTOSCALER_POLL_INTERVAL: ${AUTOSCALER_POLL_INTERVAL:-30}
      AUTOSCALER_SCALE_UP_THRESHOLD: ${AUTOSCALER_SCALE_UP_THRESHOLD:-10}
      AUTOSCALER_SCALE_DOWN_THRESHOLD: ${AUTOSCALER_SCALE_DOWN_THRESHOLD:-3}
      AUTOSCALER_COOLDOWN: ${AUTOSCALER_COOLDOWN:-60}
      COMPOSE_FILE: /compose.yml
      COMPOSE_PROJECT: ${COMPOSE_PROJECT_NAME:-w3stor}
    depends_on:
      - redis
      - workers
    networks:
      - internal

  # --- Reverse Proxy ---
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
