      No. Loop = total span of one set including trailing gap.
      The set spans from x=0 to end=1026. Add 14px trailing gap = 1040.
      But that's too big. Let me recalc properly.

      Actually the loop distance = offset between set1 start and set2 start.
      Set2 starts at the same relative position, so loop = set1_last_end + gap = 1026 + 14 = 1040.
      But let me keep it tight. Reducing Filecoin to 128.

      Filecoin  x=0   w=128  end=128
      FOC       x=142 w=160  end=302
