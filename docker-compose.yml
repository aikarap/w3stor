services:
  postgres:
    image: postgres:16
    ports: ["5433:5432"]
    environment:
      POSTGRES_DB: w3stor
      POSTGRES_USER: w3stor
      POSTGRES_PASSWORD: w3stor_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U w3stor"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

volumes:
  postgres_data:
  redis_data:
